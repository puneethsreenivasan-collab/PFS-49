<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bootstrap demo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <main class="container-fluid bg-danger" style="height: 100vh">
      <nav class="row bg-primary" style="height: 80px">
        <div class="col bg-black"></div>
        <div class="col bg-white"></div>
        <div class="col bg-warning"></div>
        <div class="col bg-secondary"></div>
      </nav>

      <section class="row bg-black" style="height: 300px; background-image: url(./img1.png); background-size: 100% 100%; background-repeat: no-repeat; position: relative">
        <div class="col-1 d-flex justify-content-center align-items-center" style="position: absolute; top: 50%; left: 5%">
          <button><</button>
        </div>
        <div class="col-1 d-flex justify-content-center align-items-center" style="position: absolute; top: 50% ;right:5%">
          <button>></button>
        </div>
      </section>


     <section class="row bg-black" style="height: 100px">
        <article class="col bg-white">
            <div class="row h-100" >
                <div class="col-4 bg-success"></div>
                <div class="col-8 bg-dark"></div>
            </div>
        </article>
        <article class="col bg-info"></article>
        <article class="col bg-success"></article>
        <article class="col bg-warning"></article>
     </section>



    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
