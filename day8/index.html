<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Bootstrap Layout</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

   
     

      section {
        height: 200px;
        background: white;
        margin-top: 20px;
        border-radius: 10px;
      }
    </style>
  </head>

  <body>
    <main class="w-100 bg-dark d-flex justify-content-center align-items-center">
      <!-- NAVBAR -->
      <nav
        class="row bg-light w-75 "
        style="height: 90px"
      >
        <div
          class="col-3 bg-warning "
        >
          1
        </div>

        <div
          class="col-3 bg-danger "
        >
          2
        </div>

        <div
          class="col-6 bg-success "
        >
          3
        </div>
      </nav>

        </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
